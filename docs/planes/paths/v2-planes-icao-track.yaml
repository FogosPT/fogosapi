get:
  operationId: v2GetPlaneTrack
  summary: Last 20 FR24 position records for an aircraft identified by its ICAO address
  tags:
    - Planes
  parameters:
    - name: icao
      in: path
      required: true
      description: ICAO 24-bit transponder address (hex, e.g. 4951b1)
      schema:
        type: string
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: array
                items:
                  type: object
                  properties:
                    icao:
                      type: string
                    registration:
                      type: string
                    callsign:
                      type: string
                    aircraft_type:
                      type: string
                    lat:
                      type: number
                    lon:
                      type: number
                    altitude:
                      type: integer
                    ground_speed:
                      type: integer
                    vertical_speed:
                      type: integer
                    track:
                      type: integer
                    squawk:
                      type: string
                    on_ground:
                      type: boolean
                    sampled_at:
                      type: string
                      format: date-time
                    created:
                      type: string
                      format: date-time
    500:
      $ref: '../../common/responses/500.yaml'
