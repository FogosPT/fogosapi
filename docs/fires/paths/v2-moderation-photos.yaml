get:
  operationId: v2ListPhotoModerationQueue
  summary: List photos pending moderation
  description: |
    Returns paginated photos awaiting (or matching the chosen status)
    moderation. Includes raw GPS / EXIF data for the moderator. Requires
    the `key` header to match `PHOTO_MODERATION_KEY`.
  tags:
    - Moderation
  parameters:
    - name: key
      in: header
      required: true
      description: Moderation API key (`PHOTO_MODERATION_KEY` env value).
      schema:
        type: string
    - name: status
      in: query
      required: false
      description: Photo status filter.
      schema:
        type: string
        enum: [pending, approved]
        default: pending
    - name: per_page
      in: query
      required: false
      description: Items per page (1–100, default 25).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: array
                items:
                  type: object
              meta:
                type: object
                properties:
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
    401:
      $ref: '../../common/responses/401.yaml'
    500:
      $ref: '../../common/responses/500.yaml'
