post:
  operationId: v2LiveActivityUnregister
  summary: Unregister an iOS Live Activity push token for an incident
  description: |
    Called when the user stops following an incident, or when the app
    determines the token is invalid. Idempotent — returns 200 even if
    the token is not registered.
  tags:
    - V2
  parameters:
    - name: id
      in: path
      required: true
      description: Incident public ID
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/x-www-form-urlencoded:
        schema:
          type: object
          required:
            - pushToken
          properties:
            pushToken:
              type: string
              description: Hex-encoded APNs push token to remove
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
    422:
      $ref: '../../common/responses/422.yaml'
    500:
      $ref: '../../common/responses/500.yaml'
