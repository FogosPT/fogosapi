post:
  operationId: v2AddWarning
  summary: Create a new warning and broadcast it via push notifications, Twitter, Telegram, and Facebook
  description: Requires a valid API key in the `key` header.
  tags:
    - Warnings
  requestBody:
    required: true
    content:
      application/x-www-form-urlencoded:
        schema:
          type: object
          required:
            - status
          properties:
            status:
              type: string
              description: Warning message text
  responses:
    200:
      description: Warning created
    401:
      $ref: '../../common/responses/401.yaml'
    500:
      $ref: '../../common/responses/500.yaml'
